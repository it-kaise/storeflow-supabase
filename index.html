// โหลดข้อมูล Master Data
async function loadMasterData() {
    try {
        const { data, error } = await sb.from('sf_master').select('*').eq('id', 'main').single();
        if (error) {
            console.error('Error loading master:', error);
            return INIT_MASTER;
        }
        return {
            matTypes: data.mat_types || INIT_MASTER.matTypes,
            partNames: data.part_names || INIT_MASTER.partNames,
            makers: data.makers || INIT_MASTER.makers,
            customers: data.customers || INIT_MASTER.customers,
            departments: data.departments || INIT_MASTER.departments,
            units: data.units || INIT_MASTER.units
        };
    } catch (e) {
        console.error('Error loading master:', e);
        return INIT_MASTER;
    }
}

// บันทึก Master Data
async function saveMasterData(master) {
    try {
        const { error } = await sb.from('sf_master').update({
            mat_types: master.matTypes,
            part_names: master.partNames,
            makers: master.makers,
            customers: master.customers,
            departments: master.departments,
            units: master.units,
            updated_at: new Date().toISOString()
        }).eq('id', 'main');
        if (error) throw error;
        return true;
    } catch (e) {
        console.error('Error saving master:', e);
        return false;
    }
}

// โหลด Lots (แยกตาม material_id)
async function loadLots() {
    try {
        const { data, error } = await sb.from('sf_lots').select('*').order('lot_date', { ascending: true });
        if (error) throw error;
        
        const grouped = {};
        data.forEach(lot => {
            if (!grouped[lot.material_id]) grouped[lot.material_id] = [];
            grouped[lot.material_id].push({
                lotNo: lot.lot_no,
                date: lot.lot_date,
                po: lot.po,
                maker: lot.maker,
                pcs: lot.pcs,
                coil: lot.coil,
                kgs: lot.kgs,
                rem_kgs: lot.rem_kgs,
                rem_pcs: lot.rem_pcs,
                rem_coil: lot.rem_coil,
                rohs: lot.rohs,
                _dbId: lot.id
            });
        });
        return grouped;
    } catch (e) {
        console.error('Error loading lots:', e);
        return {};
    }
}

// SORT FUNCTION - เรียง Size จากเล็กไปใหญ่
// ══════════════════════════════════════════════════════════
function sortBySize(materials) {
    return [...materials].sort((a, b) => {
        // แยก size ออกเป็นตัวเลข
        const parseSize = (sizeStr) => {
            if (!sizeStr) return [0, 0, 0];
            // ลบข้อความที่ไม่ใช่ตัวเลข เช่น LWC, mm
            const cleaned = sizeStr.toUpperCase().replace(/[^0-9.×xX]/g, ' ');
            const nums = cleaned.split(/[×xX\s]+/).map(n => parseFloat(n) || 0);
            return [nums[0] || 0, nums[1] || 0, nums[2] || 0]; // [OD, THK, LENGTH]
        };
        
        const sizeA = parseSize(a.size);
        const sizeB = parseSize(b.size);
        
        // เปรียบเทียบ OD, THK, LENGTH ตามลำดับ
        for (let i = 0; i < 3; i++) {
            if (sizeA[i] !== sizeB[i]) {
                return sizeA[i] - sizeB[i];
            }
        }
        
        // ถ้าเท่ากันหมด ให้เรียงตามชื่อ
        return (a.size || '').localeCompare(b.size || '');
    });
}

function exportXLSX(sheets, filename) {
    // sheets = [{name, headers, rows}]
    try {
        const XLSX = window.XLSX;
        if (!XLSX) {
            alert("กำลังโหลด SheetJS... กรุณาลองใหม่อีกครั้ง");
            return;
        }
        const wb = XLSX.utils.book_new();
        sheets.forEach(({ name, headers, rows }) => {
            const ws = XLSX.utils.aoa_to_sheet([headers, ...rows.map(r => r.map(c => c === null || c === undefined ? "" : c))]);
            // ปรับความกว้างคอลัมน์อัตโนมัติ
            const colWidths = headers.map((h, hi) => {
                const maxLen = Math.max(h.length, ...rows.map(r => String(r[hi] || "").length));
                return { wch: Math.min(Math.max(maxLen + 2, 8), 40) };
            });
            ws["!cols"] = colWidths;
            XLSX.utils.book_append_sheet(wb, ws, name.slice(0, 31));
        });
        XLSX.writeFile(wb, filename);
    }
    catch (e) {
        alert("Export ไม่สำเร็จ: " + e.message);
    }
}
